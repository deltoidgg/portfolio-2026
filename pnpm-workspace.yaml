packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  vite-plus: 0.1.24
  "@tanstack/react-start": ^1.168.25
  "@tanstack/react-router": ^1.170.15
  react: 19.2.6
  react-dom: 19.2.6
  "@tabler/icons-react": 3.44.0
  "@vercel/analytics": 2.0.1
  "@fontsource-variable/geist": ^5.2.9
  "@fontsource-variable/geist-mono": ^5.2.8
  "@vitejs/plugin-react": ^6.0.2
  "@types/react": 19.2.14
  "@types/react-dom": 19.2.3
  tailwindcss: 4.3.0
  "@tailwindcss/vite": ^4.3.0
  zod: ^4.4.3
  "@duckdb/duckdb-wasm": 1.33.1-dev45.0
  "@duckdb/node-api": 1.5.3-r.3
  "@observablehq/plot": ^0.6.17
  nitro: 3.0.260610-beta
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
# sharp comes in transitively via next (old portfolio-2025 app) and is not
# needed at runtime; unrs-resolver ships prebuilt platform binaries
allowBuilds:
  sharp: false
  unrs-resolver: false
